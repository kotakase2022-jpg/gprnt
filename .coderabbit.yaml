# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: ja-JP
early_access: false

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  review_status: true
  poem: false
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: true
  path_instructions:
    - path: "supabase/**"
      instructions: >-
        全publicテーブルのRLS、TO authenticatedとテナント所有条件、UPDATEのUSING/WITH CHECK、
        SECURITY DEFINERの非公開schema・固定search_path・実行権限、service role非公開、
        StorageのSELECT/INSERT/UPDATE条件、seedが架空データのみであることを重点確認してください。
    - path: "src/**"
      instructions: >-
        JPX正式提携やTERRAST実APIを示す捏造がないこと、サーバー側認可、Zod検証、
        テナント越境、AI根拠ID、主要ボタンの実処理、WCAG 2.1 AAを重点確認してください。
    - path: "docs/**"
      instructions: >-
        実施済みと未実施、確定事項と仮定を区別し、公式基準本文や第三者著作物の転載、
        JPXによる承認・提供を示す表現、架空のTERRAST API仕様がないことを確認してください。

chat:
  auto_reply: true
