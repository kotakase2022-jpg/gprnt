openapi: 3.1.0
info:
  title: TERRAST Sustainability Disclosure Hub Application API
  version: 0.1.0-concept
  summary: Internal application command/query contract for the concept MVP
  description: |
    Design contract for server-side application endpoints. It is not a TERRAST API
    specification and does not assert that these routes are deployed. The production
    TERRAST endpoint, authentication, and payload contract are unknown; no external
    TERRAST path appears in this document. Implementations must authenticate, enforce
    tenant membership/consent server-side, validate with Zod, and preserve RLS.
  contact:
    name: Repository maintainers
servers:
  - url: http://localhost:3000
    description: Local development only
tags:
  - name: System
  - name: Sync
  - name: Workspace
  - name: AI
  - name: Evidence
  - name: Reports
security:
  - sessionCookie: []
  - bearerAuth: []
paths:
  /api/v1/health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Return application readiness without secret/provider details
      security: []
      x-implementation-status: design-contract
      responses:
        "200":
          description: Process is ready to receive requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v1/sync/preview:
    post:
      tags: [Sync]
      operationId: previewSync
      summary: Create a dry-run TERRAST connector diff
      description: |
        Uses the configured connector. In this MVP the supported default is mock;
        API mode fails closed until an authorized contract is supplied.
      x-implementation-status: design-contract
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncPreviewRequest"
      responses:
        "201":
          description: Dry-run preview created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncJob"
        "400":
          $ref: "#/components/responses/ValidationProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/ForbiddenProblem"
        "409":
          $ref: "#/components/responses/ConflictProblem"
        "429":
          $ref: "#/components/responses/RateLimitedProblem"
  /api/v1/sync/jobs/{jobId}:
    get:
      tags: [Sync]
      operationId: getSyncJob
      summary: Read a tenant-owned sync job and its safe result
      x-implementation-status: design-contract
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Job visible to the current tenant member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncJob"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/ForbiddenProblem"
        "404":
          $ref: "#/components/responses/NotFoundProblem"
  /api/v1/sync/jobs/{jobId}/apply:
    post:
      tags: [Sync]
      operationId: applySyncJob
      summary: Apply selected preview records and explicit conflict resolutions
      description: |
        Re-authorizes the caller, rejects stale previews, and transactionally applies
        selected records. Manual resolutions require a reason. Replays with the same
        idempotency key return the same logical outcome.
      x-implementation-status: design-contract
      parameters:
        - $ref: "#/components/parameters/JobId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncApplyRequest"
      responses:
        "200":
          description: Existing idempotent result returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncApplyResult"
        "201":
          description: Selected records applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncApplyResult"
        "400":
          $ref: "#/components/responses/ValidationProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/ForbiddenProblem"
        "404":
          $ref: "#/components/responses/NotFoundProblem"
        "409":
          $ref: "#/components/responses/ConflictProblem"
  /api/workspace/metric-values:
    post:
      tags: [Workspace]
      operationId: saveManualMetricValue
      summary: Create or update one manual metric value with an atomic audit event
      description: |
        Implemented first Supabase production slice. The route validates a bearer
        JWT, trusted app role, current database membership, company tenancy, open
        reporting period, active metric, scalar type and unit through the caller's
        RLS-scoped client before creating a server-secret client. A service-only,
        SECURITY INVOKER RPC locks an active membership for the same effective role,
        repeats the resource checks, enforces optimistic concurrency, and writes the
        manual metric plus value/reason/scope/boundary hashes in one transaction. It applies
        a shared actor-and-tenant limit of 30 successful writes per minute and returns
        a safe saved-row payload from that same transaction. The route validates the
        payload before returning it; no post-commit enrichment query is performed.
        Roles are limited to system_admin, company_admin and preparer.
        Code implementation does not imply remote migration or deployment evidence.
      x-implementation-status: implemented
      security:
        - bearerAuth: []
      parameters:
        - name: x-request-id
          in: header
          required: false
          description: |
            Optional safe correlation value. An absent or invalid value is replaced
            by a server-generated UUID rather than reflected.
          schema:
            type: string
            minLength: 1
            maxLength: 100
            pattern: "^[A-Za-z0-9._:-]+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualMetricValueRequest"
      responses:
        "200":
          description: Manual metric value and audit event committed atomically; authorized row returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualMetricValueResponse"
        "400":
          description: Strict input or database invariant validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "401":
          description: Bearer token is missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "403":
          description: Role, membership, tenant or resource authorization failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "409":
          description: expectedVersion is stale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "429":
          description: Shared actor-and-tenant command limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "503":
          description: Authorization query, server secret, or RPC is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
  /api/ai/disclosure:
    post:
      tags: [AI]
      operationId: generateDisclosureDraft
      summary: Generate a structured, evidence-linked disclosure proposal
      description: |
        Server-side only. Returns insufficient_evidence instead of unsupported facts.
        Every successful draft remains an AI proposal requiring human review. The
        x-demo-role header is accepted only while explicit demo mode is enabled.
      x-implementation-status: implemented
      security:
        - bearerAuth: []
        - demoRole: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiDraftRequest"
      responses:
        "200":
          description: Validated AI or deterministic-demo result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiDraftResponse"
        "400":
          description: Request body failed strict validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "401":
          description: Missing/invalid identity or disallowed role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "403":
          description: The authenticated principal cannot access one or more requested sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "429":
          description: In-process demo request budget exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "503":
          description: Authentication, source access, server configuration, or atomic audit persistence is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleError"
        "502":
          description: Provider generation/validation failed; deterministic fallback is available
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [error, correlationId, fallbackAvailable]
                properties:
                  error:
                    type: string
                    const: ai_generation_failed
                  correlationId:
                    type: string
                  fallbackAvailable:
                    type: boolean
                    const: true
  /api/v1/evidence/{evidenceId}/signed-url:
    post:
      tags: [Evidence]
      operationId: createEvidenceSignedUrl
      summary: Create a short-lived URL after tenant/entity authorization
      x-implementation-status: design-contract
      parameters:
        - name: evidenceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                disposition:
                  type: string
                  enum: [inline, attachment]
                  default: inline
      responses:
        "200":
          description: Ephemeral URL; clients must not persist or log it
          headers:
            Cache-Control:
              schema:
                type: string
              description: Must prevent shared/public caching
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignedUrlResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/ForbiddenProblem"
        "404":
          $ref: "#/components/responses/NotFoundProblem"
  /api/v1/reports/exports:
    post:
      tags: [Reports]
      operationId: createReportExport
      summary: Produce a bounded tenant-authorized CSV or JSON export
      description: Browser print-to-PDF is handled by the report page, not this endpoint.
      x-implementation-status: design-contract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportRequest"
      responses:
        "200":
          description: Bounded export payload
          headers:
            Content-Disposition:
              schema:
                type: string
          content:
            text/csv:
              schema:
                type: string
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/ValidationProblem"
        "401":
          $ref: "#/components/responses/UnauthorizedProblem"
        "403":
          $ref: "#/components/responses/ForbiddenProblem"
        "429":
          $ref: "#/components/responses/RateLimitedProblem"
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: sb-access-token
      description: Illustrative session name; implementation must use its configured secure cookie contract.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    demoRole:
      type: apiKey
      in: header
      name: x-demo-role
      description: Explicit demo-mode identity only; never a production authorization mechanism.
  parameters:
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Unique within the authenticated organization for one logical command.
      schema:
        type: string
        minLength: 16
        maxLength: 128
        pattern: "^[A-Za-z0-9._:-]+$"
  responses:
    ValidationProblem:
      description: Request validation failed
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    UnauthorizedProblem:
      description: Authentication is missing or expired
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ForbiddenProblem:
      description: Authenticated principal lacks tenant/resource permission
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFoundProblem:
      description: Resource is not visible or does not exist
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ConflictProblem:
      description: Idempotency mismatch, stale preview, or unresolved conflict
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    RateLimitedProblem:
      description: Request budget exceeded
      headers:
        Retry-After:
          schema:
            type: integer
            minimum: 1
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, demoMode]
      properties:
        status:
          type: string
          enum: [ready]
        demoMode:
          type: boolean
    SyncPreviewRequest:
      type: object
      additionalProperties: false
      required: [organizationId, companyId, reportingPeriodId, connectorMode]
      properties:
        organizationId:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        reportingPeriodId:
          type: string
          format: uuid
        connectorMode:
          type: string
          enum: [mock, api, csv, json]
        requestedMetricCodes:
          type: array
          maxItems: 200
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 100
    SyncRecord:
      type: object
      additionalProperties: false
      required: [id, sourceRecordId, changeType, provenance]
      properties:
        id:
          type: string
          format: uuid
        sourceRecordId:
          type: string
        metricCode:
          type: string
        changeType:
          type: string
          enum: [added, updated, conflict, unchanged, invalid]
        beforeValue: {}
        incomingValue: {}
        validationIssues:
          type: array
          items:
            type: string
        provenance:
          $ref: "#/components/schemas/Provenance"
    SyncJob:
      type: object
      additionalProperties: false
      required:
        [
          id,
          organizationId,
          companyId,
          connectorMode,
          dryRun,
          status,
          records,
          summary,
        ]
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        connectorMode:
          type: string
          enum: [mock, api, csv, json]
        dryRun:
          type: boolean
        status:
          type: string
          enum: [pending, running, preview_ready, completed, failed, cancelled]
        records:
          type: array
          items:
            $ref: "#/components/schemas/SyncRecord"
        summary:
          $ref: "#/components/schemas/SyncSummary"
        safeErrorCode:
          type: [string, "null"]
    SyncSummary:
      type: object
      additionalProperties: false
      required: [added, updated, conflicts, unchanged, invalid]
      properties:
        added:
          type: integer
          minimum: 0
        updated:
          type: integer
          minimum: 0
        conflicts:
          type: integer
          minimum: 0
        unchanged:
          type: integer
          minimum: 0
        invalid:
          type: integer
          minimum: 0
    SyncApplyRequest:
      type: object
      additionalProperties: false
      required: [previewVersion, selections]
      properties:
        previewVersion:
          type: string
          minLength: 1
        selections:
          type: array
          maxItems: 500
          items:
            type: object
            additionalProperties: false
            required: [syncRecordId, selected]
            properties:
              syncRecordId:
                type: string
                format: uuid
              selected:
                type: boolean
              resolution:
                type: string
                enum: [terrast, manual, skip]
              resolutionReason:
                type: string
                minLength: 1
                maxLength: 1000
    SyncApplyResult:
      type: object
      additionalProperties: false
      required: [jobId, appliedMetricValueIds, auditLogIds, summary]
      properties:
        jobId:
          type: string
          format: uuid
        appliedMetricValueIds:
          type: array
          items:
            type: string
            format: uuid
        auditLogIds:
          type: array
          items:
            type: string
            format: uuid
        summary:
          $ref: "#/components/schemas/SyncSummary"
    Provenance:
      type: object
      additionalProperties: false
      required:
        [
          sourceType,
          sourceSystem,
          sourceRecordId,
          retrievedAt,
          reportingPeriod,
          confidence,
        ]
      properties:
        sourceType:
          type: string
          enum: [terrast_mock, terrast_api, file_import]
        sourceSystem:
          type: string
        sourceRecordId:
          type: string
        retrievedAt:
          type: string
          format: date-time
        reportingPeriod:
          type: object
          additionalProperties: false
          required: [start, end]
          properties:
            start:
              type: string
              format: date
            end:
              type: string
              format: date
        unit:
          type: string
        confidence:
          type: string
          enum: [high, medium, low, unknown]
    ManualMetricValueRequest:
      type: object
      additionalProperties: false
      required:
        [
          companyId,
          reportingPeriodId,
          metricCode,
          value,
          unit,
          consolidationScope,
          organizationalBoundary,
          changeReason,
          expectedVersion,
        ]
      properties:
        companyId:
          type: string
          format: uuid
        reportingPeriodId:
          type: string
          format: uuid
        metricCode:
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[A-Za-z0-9][A-Za-z0-9._:-]*$"
        value:
          oneOf:
            - type: number
            - type: string
              minLength: 1
              maxLength: 10000
            - type: boolean
        unit:
          $ref: "#/components/schemas/MetricUnit"
        consolidationScope:
          type: string
          minLength: 1
          maxLength: 200
        organizationalBoundary:
          type: string
          minLength: 1
          maxLength: 200
        changeReason:
          type: string
          minLength: 3
          maxLength: 500
        expectedVersion:
          type: integer
          minimum: 0
          description: Zero creates the logical manual row; updates require the exact current version.
    ManualMetricValueResponse:
      type: object
      additionalProperties: false
      required: [data, correlationId]
      properties:
        data:
          $ref: "#/components/schemas/MetricValueDatabaseRow"
        correlationId:
          type: string
          minLength: 1
    MetricValueDatabaseRow:
      type: object
      additionalProperties: false
      required:
        [
          id,
          company_id,
          metric_id,
          reporting_period_id,
          value_json,
          original_value,
          normalized_value,
          unit,
          original_unit,
          consolidation_scope,
          organizational_boundary,
          source_type,
          source_system,
          source_record_id,
          source_document,
          imported_at,
          last_updated_at,
          confidence_level,
          verification_status,
          owner_user_id,
          reviewer_user_id,
          change_reason,
          created_at,
          manual_override,
          version,
          metrics,
          reporting_periods,
        ]
      properties:
        id: { type: string, format: uuid }
        company_id: { type: string, format: uuid }
        metric_id: { type: string, format: uuid }
        reporting_period_id: { type: string, format: uuid }
        value_json:
          oneOf:
            - type: number
            - type: string
            - type: boolean
        original_value:
          type: string
        normalized_value:
          oneOf:
            - type: number
            - type: string
            - type: "null"
        unit:
          type: string
          minLength: 1
        original_unit:
          type: string
          minLength: 1
        consolidation_scope:
          type: string
          minLength: 1
        organizational_boundary:
          type: string
          minLength: 1
        source_type: { type: string, minLength: 1 }
        source_system: { type: string, minLength: 1 }
        source_record_id:
          type: string
          minLength: 1
        source_document:
          type: [string, "null"]
        imported_at:
          type: string
          format: date-time
        last_updated_at: { type: string, format: date-time }
        confidence_level:
          type: string
          enum: [unknown, low, medium, high]
        verification_status:
          type: string
          enum: [unverified, internally_reviewed, externally_assured]
        owner_user_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        reviewer_user_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
        change_reason:
          type: [string, "null"]
        created_at: { type: string, format: date-time }
        manual_override: { type: boolean }
        version: { type: integer, minimum: 1 }
        metrics:
          oneOf:
            - $ref: "#/components/schemas/MetricDefinitionDatabaseRelation"
            - type: array
              minItems: 1
              maxItems: 1
              items:
                $ref: "#/components/schemas/MetricDefinitionDatabaseRelation"
        reporting_periods:
          oneOf:
            - $ref: "#/components/schemas/ReportingPeriodDatabaseRelation"
            - type: array
              minItems: 1
              maxItems: 1
              items:
                $ref: "#/components/schemas/ReportingPeriodDatabaseRelation"
    MetricDefinitionDatabaseRelation:
      type: object
      additionalProperties: false
      required:
        [
          id,
          metric_code,
          name,
          description,
          category,
          value_type,
          canonical_unit,
          allowed_units,
          is_required,
          is_sensitive,
          terrast_field_key,
        ]
      properties:
        id: { type: string, format: uuid }
        metric_code: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        description: { type: string }
        category: { type: string, minLength: 1 }
        value_type:
          type: string
          enum: [number, text, boolean]
        canonical_unit:
          type: [string, "null"]
        allowed_units:
          type: array
          items: { type: string }
        is_required: { type: boolean }
        is_sensitive: { type: boolean }
        terrast_field_key:
          type: [string, "null"]
    ReportingPeriodDatabaseRelation:
      type: object
      additionalProperties: false
      required: [label]
      properties:
        label: { type: string, minLength: 1 }
    MetricUnit:
      type: string
      enum:
        [
          tCO2e,
          kgCO2e,
          gCO2e,
          MWh,
          kWh,
          GJ,
          TJ,
          m3,
          L,
          percent,
          ratio,
          people,
          hours,
          JPY,
          million_JPY,
          t,
          kg,
          unitless,
        ]
    AiDraftRequest:
      type: object
      additionalProperties: false
      required:
        [
          companyId,
          requirementId,
          requirementSummary,
          sourceData,
          evidenceIds,
          requestedTasks,
        ]
      properties:
        companyId:
          type: string
          minLength: 1
          maxLength: 100
        requirementId:
          type: string
          minLength: 1
          maxLength: 100
        requirementSummary:
          type: string
          minLength: 1
          maxLength: 1000
        sourceData:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/AiSourceDatum"
        priorYearData:
          type: array
          default: []
          maxItems: 50
          items:
            $ref: "#/components/schemas/AiSourceDatum"
        evidenceIds:
          type: array
          maxItems: 50
          items:
            type: string
            minLength: 1
            maxLength: 200
        requestedTasks:
          type: array
          maxItems: 10
          items:
            type: string
            minLength: 1
            maxLength: 200
        priorYearText:
          type: string
          maxLength: 5000
    AiSourceDatum:
      type: object
      additionalProperties: false
      required: [id, label, value, unit, period, confidence]
      properties:
        id:
          type: string
          minLength: 1
          maxLength: 200
        label:
          type: string
          minLength: 1
          maxLength: 200
        value:
          oneOf:
            - type: string
            - type: number
            - type: boolean
        unit:
          type: string
          maxLength: 40
        period:
          type: string
          maxLength: 40
        confidence:
          type: number
          minimum: 0
          maximum: 100
        organizationalBoundary:
          type: string
          maxLength: 200
    AiDraftResponse:
      type: object
      additionalProperties: false
      required: [output, meta]
      properties:
        output:
          $ref: "#/components/schemas/AiDisclosureOutput"
        meta:
          type: object
          additionalProperties: false
          required:
            [promptVersion, inputHash, executedBy, executedAt, mode, model]
          properties:
            promptVersion:
              type: string
            inputHash:
              type: string
              pattern: "^[a-f0-9]{64}$"
            executedBy:
              type: string
            executedAt:
              type: string
              format: date-time
            mode:
              type: string
              enum: [demo, api]
            model:
              type: string
    AiDisclosureOutput:
      type: object
      additionalProperties: false
      required:
        - status
        - label
        - reviewRequired
        - disclosureDraft
        - missingQuestions
        - inconsistencies
        - climateCandidates
        - transitionPlanDraft
        - priorYearChanges
        - weakEvidenceWarnings
        - claims
        - insufficientEvidence
      properties:
        status:
          type: string
          enum: [draft, insufficient_evidence]
        label:
          type: string
          const: AI提案・要レビュー
        reviewRequired:
          type: boolean
          const: true
        disclosureDraft:
          oneOf:
            - $ref: "#/components/schemas/GroundedText"
            - type: "null"
        missingQuestions:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [question, relatedRequirementId, requiredEvidence]
            properties:
              question: { type: string }
              relatedRequirementId: { type: string }
              requiredEvidence: { type: string }
        inconsistencies:
          type: array
          items:
            type: object
            additionalProperties: true
        climateCandidates:
          type: array
          items:
            type: object
            additionalProperties: true
        transitionPlanDraft:
          oneOf:
            - $ref: "#/components/schemas/GroundedText"
            - type: "null"
        priorYearChanges:
          type: array
          items:
            type: object
            additionalProperties: true
        weakEvidenceWarnings:
          type: array
          items:
            type: object
            additionalProperties: true
        claims:
          type: array
          items:
            $ref: "#/components/schemas/GroundedText"
        insufficientEvidence:
          oneOf:
            - type: object
              additionalProperties: false
              required: [reason, missingDataDescriptions]
              properties:
                reason: { type: string }
                missingDataDescriptions:
                  type: array
                  minItems: 1
                  items: { type: string }
            - type: "null"
    GroundedText:
      type: object
      additionalProperties: false
      required: [text, evidenceDataIds]
      properties:
        text:
          type: string
        evidenceDataIds:
          type: array
          items:
            type: string
    SimpleError:
      type: object
      additionalProperties: false
      required: [error, correlationId]
      properties:
        error:
          type: string
        correlationId:
          type: string
    SignedUrlResponse:
      type: object
      additionalProperties: false
      required: [url, expiresAt]
      properties:
        url:
          type: string
          format: uri
          description: Sensitive ephemeral value; never persist or log.
        expiresAt:
          type: string
          format: date-time
    ExportRequest:
      type: object
      additionalProperties: false
      required: [organizationId, companyId, reportType, format]
      properties:
        organizationId:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        reportingPeriodId:
          type: string
          format: uuid
        reportType:
          type: string
          enum:
            [readiness, requirements, gaps, ghg, transition, provenance, audit]
        format:
          type: string
          enum: [csv, json]
    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status, code, correlationId]
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        code:
          type: string
        detail:
          type: string
          description: Safe client-facing detail only; no stack/provider/database text.
        correlationId:
          type: string
        fieldIssues:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [path, message]
            properties:
              path:
                type: string
              message:
                type: string
